<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login &mdash; ETicket</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 2rem 2rem 1.75rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.75rem;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    background: #e6f1fb;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .brand-name {
    font-size: 17px;
    font-weight: 600;
    color: #111827;
  }

  .brand-name span { color: #185FA5; }

  /* Headings */
  h2 {
    font-size: 20px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 1.5rem;
  }

  /* Fields */
  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 5px;
  }

  .input-wrap { position: relative; }

  .input-wrap input {
    width: 100%;
    padding: 9px 12px;
    font-size: 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #ffffff;
    color: #111827;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .input-wrap input:focus {
    border-color: #185FA5;
    box-shadow: 0 0 0 3px rgba(24, 95, 165, 0.1);
  }

  .input-wrap input::placeholder { color: #9ca3af; }

  /* Eye toggle */
  .toggle-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: #9ca3af;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  .toggle-btn:hover { color: #6b7280; }
  .toggle-btn svg { width: 18px; height: 18px; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    background: #185FA5;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { background: #0C447C; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Message */
  .message {
    font-size: 13px;
    text-align: center;
    margin-top: 0.75rem;
    min-height: 18px;
  }

  .message.error { color: #dc2626; }
  .message.success { color: #16a34a; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid #f3f4f6;
    margin: 1.25rem 0 1rem;
  }

  .footer-text {
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
  }
</style>

</head>
<body>

<div class="card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="13" rx="2" fill="#185FA5"/>
        <path d="M15 12.5a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3Z" fill="#fff" fill-opacity=".9"/>
        <rect x="7" y="5" width="1.5" height="2.5" rx=".75" fill="#185FA5"/>
        <rect x="15.5" y="5" width="1.5" height="2.5" rx=".75" fill="#114981"/>
        <line x1="2" y1="10" x2="22" y2="10" stroke="#fff" stroke-opacity=".2" stroke-width=".75"/>
      </svg>
    </div>
    <span class="brand-name"><h3 style='color:#114981;'>Webs Tickets</h3></span>
  </div>

  <div style='margin-bottom:20px;'>
    <h2 style='color:#185FA5;'>Welcome back</h2>
  </div>

  <!-- Username / Phone -->
  <div class="field">
    <label for="phone"></label>
    <div class="input-wrap">
      <input type="text" id="phone" placeholder="Enter your email or phone">
    </div>
  </div>

  <!-- Password -->
  <div class="field">
    <label for="password"></label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter your password" style="padding-right: 38px;">
      <button class="toggle-btn" type="button" id="toggleBtn" onclick="togglePassword()" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submitBtn" onclick="LogginUser()">
    <span id="btnText">Sign in</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="message" id="message"></div>

  <hr class="divider">
  <p class="footer-text">Your tickets, your events &mdash; all in one place</p>

</div>

<script>
  const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function togglePassword() {
    const field = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const btn = document.getElementById('toggleBtn');
    const isHidden = field.type === 'password';
    field.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  }

  function getCSRFToken() {
    let v = null;
    document.cookie.split(';').forEach(c => {
      const t = c.trim();
      if (t.startsWith('csrftoken=')) v = t.substring('csrftoken='.length);
    });
    return v;
  }

  async function LogginUser() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const message = document.getElementById('message');

    message.className = 'message';
    message.innerText = '';

    if (!phone || !password) {
      message.className = 'message error';
      message.innerText = 'Please fill in all fields.';
      return;
    }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.innerText = 'Signing in...';

    try {
      const response = await fetch('/login_validate/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCSRFToken(),
        },
        body: JSON.stringify({ identifier: phone, password })
      });

      const data = await response.json();

      if (data.success) {
        message.className = 'message success';
        message.innerText = 'Login successful! Redirecting...';
        document.getElementById('phone').value = '';
        document.getElementById('password').value = '';
        if (data.url) setTimeout(() => { window.location.href = data.url; }, 800);
      } else {
        message.className = 'message error';
        message.innerText = data.detail || 'Invalid credentials. Please try again.';
      }

    } catch {
      message.className = 'message error';
      message.innerText = 'Network error. Please try again.';
    }

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.innerText = 'Sign in';
  }
</script>

</body>
</html>
