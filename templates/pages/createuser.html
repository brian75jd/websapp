<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account &mdash; ETicket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .page-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    gap: 1rem;
  }

  /* Top badge */
  .account-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #dbe8ff;
    border: 1px solid #b6ccff;
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #2563eb;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .account-badge .dot {
    width: 7px; height: 7px;
    background: #2563eb;
    border-radius: 50%;
  }

  .card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    box-shadow: 0 2px 24px rgba(37, 99, 235, 0.08);
  }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 1.5rem;
  }

  .brand-icon {
    width: 34px; height: 34px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-name {
    font-size: 16px;
    font-weight: 600;
    color: #0f172a;
    letter-spacing: -0.01em;
  }

  .brand-name span { color: #2563eb; }

  .divider-line {
    height: 1px;
    background: #f1f5f9;
    margin-bottom: 1.5rem;
  }

  h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: #0f172a;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .field { margin-bottom: 0.9rem; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 5px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .optional-tag {
    font-weight: 400;
    color: #94a3b8;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
    margin-left: 4px;
  }

  .input-wrap { position: relative; }

  .input-wrap input {
    width: 100%;
    padding: 10px 13px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid #e2e8f0;
    border-radius: 9px;
    background: #f8fafc;
    color: #0f172a;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .input-wrap input:focus {
    border-color: #2563eb;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .input-wrap input::placeholder { color: #cbd5e1; }

  .toggle-btn {
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    padding: 0; cursor: pointer;
    color: #94a3b8;
    display: flex; align-items: center;
    transition: color 0.15s;
  }

  .toggle-btn:hover { color: #475569; }
  .toggle-btn svg { width: 17px; height: 17px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .submit-btn {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    background: #2563eb;
    color: #ffffff;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }

  .submit-btn:hover {
    background: #1d4ed8;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }

  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .message {
    font-size: 13px;
    text-align: center;
    margin-top: 0.75rem;
    min-height: 18px;
    line-height: 1.5;
  }

  .message.error { color: #dc2626; }
  .message.success { color: #16a34a; }

  .footer {
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.6;
  }

  .footer a { color: #2563eb; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .sep {
    display: flex; align-items: center; gap: 10px;
    margin: 1.25rem 0 1rem;
  }

  .sep-line { flex: 1; height: 1px; background: #f1f5f9; }
  .sep-text { font-size: 11px; color: #cbd5e1; white-space: nowrap; }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="account-badge">
    <span class="dot"></span>
    User Account
  </div>

  <div class="card">

    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="20" height="13" rx="2" fill="#2563eb"/>
          <path d="M15 12.5a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3Z" fill="#fff" fill-opacity=".9"/>
          <rect x="7" y="5" width="1.5" height="2.5" rx=".75" fill="#2563eb"/>
          <rect x="15.5" y="5" width="1.5" height="2.5" rx=".75" fill="#2563eb"/>
          <line x1="2" y1="10" x2="22" y2="10" stroke="#fff" stroke-opacity=".2" stroke-width=".75"/>
        </svg>
      </div>
      <span class="brand-name">E<span>Ticket</span></span>
    </div>

    <div class="divider-line"></div>

    <h2>Create your account</h2>
    <p class="subtitle">Buy and manage tickets for events near you.</p>

    <div class="field">
      <label for="name">Username</label>
      <div class="input-wrap">
        <input type="text" id="name" placeholder="Choose a username">
      </div>
    </div>

    <div class="field">
      <label for="email">Email <span class="optional-tag"></span></label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com">
      </div>
    </div>

    <div class="field">
      <label for="phone">Phone number</label>
      <div class="input-wrap">
        <input type="text" id="phone" placeholder="+265 999 000 000">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Create password" style="padding-right: 36px;">
          <button class="toggle-btn" type="button" id="toggleBtn1" onclick="togglePwd('password','toggleBtn1','eye1')" aria-label="Show password">
            <svg id="eye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="password2">Confirm</label>
        <div class="input-wrap">
          <input type="password" id="password2" placeholder="Repeat password" style="padding-right: 36px;">
          <button class="toggle-btn" type="button" id="toggleBtn2" onclick="togglePwd('password2','toggleBtn2','eye2')" aria-label="Show password">
            <svg id="eye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="createUser()">
      <span id="btnText">Create account</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="message" id="message"></div>

    <div class="sep">
      <span class="sep-line"></span>
      <span class="sep-text">Are you an organizer?</span>
      <span class="sep-line"></span>
    </div>

    <div class="footer">
      <a href="/organizer/">Create an organizer account instead</a>
    </div>

  </div>
</div>

<script>
  const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  function togglePwd(fieldId, btnId, iconId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(iconId);
    const btn = document.getElementById(btnId);
    const isHidden = field.type === 'password';
    field.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  }

function getCSRFToken() {
  const name = 'csrftoken=';
  const decoded = decodeURIComponent(document.cookie);
  const cookies = decoded.split(';');

  for (let cookie of cookies) {
    cookie = cookie.trim();
    if (cookie.startsWith(name)) {
      return cookie.substring(name.length);
    }
  }
  return null;
}

console.log(getCSRFToken());
  async function createUser() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value.trim();
    const password2 = document.getElementById('password2').value.trim();

    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const message = document.getElementById('message');

    message.className = 'message';
    message.innerText = '';

    if (!name || !phone || !password || !password2) {
      message.className = 'message error';
      message.innerText = 'Please fill in all required fields.';
      return;
    }

    if (password !== password2) {
      message.className = 'message error';
      message.innerText = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.innerText = 'Creating account...';

    try {
      const response = await fetch('/create_user_account/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCSRFToken(),
        },
        credentials: 'same-origin', 
        body: JSON.stringify({ name, email, phone_number: phone, password, password2 })
      });

      const data = await response.json();

      if (response.ok) {
        message.className = 'message success';
        message.innerText = data.detail || 'Account created successfully!';
        ['name','email','phone','password','password2'].forEach(id => {
          document.getElementById(id).value = '';
        });
        if (data.url) setTimeout(() => { window.location.href = data.url; }, 800);
      } else {
        message.className = 'message error';
        message.innerText = Array.isArray(data.detail) ? data.detail.join(' ') : (data.detail || 'Something went wrong.');
      }
    } catch(error) {
      console.log(`${error}`)
      message.className = 'message error';
      message.innerText = `${error}`;
    }

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.innerText = 'Create account';
  }
</script>
</body>
</html>
